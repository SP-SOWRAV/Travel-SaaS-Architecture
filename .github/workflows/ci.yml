name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Prisma Client's generated types are referenced throughout apps/api's source, so
      # they must exist before nest build's TypeScript compilation runs (no DB connection
      # needed for `generate`, only for `migrate`).
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - run: npm run build:api
      - run: npm run build:web

      - name: Unit tests
        run: npm run test --workspace=apps/api
